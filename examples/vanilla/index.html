<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DR Map - Vanilla Web Component</title>
    <style>
      body {
        margin: 0;
        font-family: system-ui, sans-serif;
        background: #0f172a;
        color: #f8fafc;
      }
      main {
        max-width: 980px;
        margin: 0 auto;
        padding: 2rem 1rem;
      }
      dr-map {
        display: block;
        height: 560px;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Vanilla JS + &lt;dr-map&gt;</h1>
      <dr-map
        show-labels
        show-popup
        selection-mode="multiple"
        colors='{"defaultFill":"#dbeafe","selectedFill":"#1d4ed8","markerFill":"#dc2626"}'
        data='{"DO-01":{"fill":"#eef2ff","selectedFill":"#be123c","popup":"Sede administrativa"},"DO-25":{"selectedFill":"#047857","popup":"Operaciones regionales"}}'
        markers='[{"id":"car-sdq","x":444.68,"y":328.42,"label":"Transporte","icon":"car","color":"#dc2626","popup":"Flota activa","provinceId":"DO-01"},{"id":"shield-sti","x":237.91,"y":135.92,"label":"Seguridad","icon":"shield","color":"#2563eb","popup":"Punto de control","provinceId":"DO-25"}]'
      ></dr-map>
      <p id="last-event">Último evento: —</p>
    </main>

    <script type="module">
      import "dominican-republic-map/element";
      import "dominican-republic-map/styles.css";

      const map = document.querySelector("dr-map");
      const lastEvent = document.querySelector("#last-event");

      map?.addEventListener("provinceclick", (event) => {
        lastEvent.textContent = `Último evento: ${event.detail.province.name}`;
      });

      map?.addEventListener("popupopen", (event) => {
        const target = event.detail;
        lastEvent.textContent =
          target.type === "province"
            ? `Popup: ${target.province.name}`
            : `Popup: ${target.marker.label ?? target.marker.id}`;
      });
    </script>
  </body>
</html>
